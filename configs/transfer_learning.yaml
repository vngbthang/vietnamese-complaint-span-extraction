# Transfer Learning Config
# NOTE: No model checkpoints are saved. Only metrics, predictions, and reports.

aux_data_dir: data/auxiliary_ate_bio_clean
target_data_dir: data/complaint_span_bio_clean
output_dir: outputs/experiments/transfer_learning
model_name: vinai/phobert-base-v2
max_length: 256
aux_epochs: 3
target_epochs: 5
train_batch_size: 16
eval_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 0.00002
weight_decay: 0.01
warmup_ratio: 0.06
seed: 42
fp16: true

# Checkpoint saving is DISABLED — metrics only
save_strategy: "no"
save_total_limit: 0
load_best_model_at_end: false
save_model: false
save_checkpoints: false
keep_checkpoints: false
cleanup_checkpoints: true

# Evaluation per epoch
evaluation_strategy: "epoch"
logging_steps: 50

aux_label_set:
  - O
  - B-ASP
  - I-ASP

target_label_set:
  - O
  - B-COMP
  - I-COMP

strategies:
  aux_all_then_complaint:
    aux_split: all
    description: "Pretrain on all auxiliary data, then fine-tune on complaint spans"

  causasent_then_complaint:
    aux_split: all
    aux_filter_source: causasent
    description: "Pretrain on CausaSent-ATE-v2 only, then fine-tune on complaint spans"

  uvisd4sa_then_complaint:
    aux_split: all
    aux_filter_source: uvisd4sa
    description: "Pretrain on UIT-ViSD4SA only, then fine-tune on complaint spans"
